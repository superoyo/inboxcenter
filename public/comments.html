<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คอมเมนต์ — FB Inbox Center</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cm-layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      height: calc(100vh - 56px);
      background: var(--card);
    }
    .cm-left { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
    .cm-left-head {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .cal-nav-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .cal-title { font-weight: 700; font-size: 16px; min-width: 130px; text-align: center; }
    .cal-nav {
      border: 1px solid var(--border); background: var(--card); border-radius: 8px;
      width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--text);
    }
    .cal-nav:hover { background: var(--bg); }

    /* ปฏิทินโพสต์ */
    .cal-wrap { flex: 1; overflow-y: auto; padding: 10px 14px 20px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .cal-dow span { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; grid-auto-rows: 1fr; }
    .cal-cell {
      border: 1px solid var(--border); border-radius: 8px; min-height: 92px;
      padding: 4px; display: flex; flex-direction: column; gap: 3px; overflow: hidden;
    }
    .cal-cell.empty { border-color: transparent; background: transparent; }
    .cal-cell.today { border-color: var(--primary); }
    .cal-cell .daynum { font-size: 12px; font-weight: 700; color: var(--muted); padding: 1px 3px; }
    .cal-cell.today .daynum { color: var(--primary); }
    .cal-post {
      cursor: pointer; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border); background: var(--card);
    }
    .cal-post:hover { border-color: var(--primary); }
    .cal-post.active { outline: 2px solid var(--primary); }
    .cal-post img { width: 100%; height: 40px; object-fit: cover; display: block; background: var(--bg); }
    .cal-post .cp-txt {
      font-size: 10.5px; line-height: 1.3; padding: 2px 4px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .cal-post .cp-eng {
      display: flex; gap: 6px; font-size: 9.5px; color: var(--muted);
      padding: 0 4px 3px; flex-wrap: wrap;
    }

    /* คอลัมน์ขวา: คอมเมนต์ */
    .cm-right { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .cm-post-head { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .cm-post-head .txt { font-size: 14px; font-weight: 600; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    /* แถบ engagement: reactions / comments / shares */
    .eng-bar { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; }
    .eng-bar .eng { display: flex; align-items: center; gap: 5px; color: var(--text); }
    .eng-bar .eng b { font-weight: 700; }
    .eng-bar .eng span { color: var(--muted); font-size: 12px; }
    .cm-list { flex: 1; overflow-y: auto; padding: 16px 18px; background: var(--card); }

    /* คอมเมนต์สไตล์ Facebook: avatar เล็ก + bubble เทาหุ้มพอดีข้อความ + แถว action เล็กใต้ bubble */
    .cmt { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .cmt .ava, .cmt .ava-fb {
      width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 13px;
    }
    .cmt .box { min-width: 0; max-width: 76%; }
    .cmt .bub {
      display: inline-block;
      background: #f0f2f5;
      border-radius: 16px;
      padding: 7px 12px;
      font-size: 13.5px;
      line-height: 1.45;
      word-break: break-word;
      text-align: left;
    }
    .cmt.by-page .bub { background: #e7f0fe; }
    .cmt .bub .txt { white-space: pre-wrap; }
    .cmt .who { font-weight: 600; font-size: 13px; margin-bottom: 1px; }
    .cmt.by-page .who { color: var(--primary); }
    .cmt .sub {
      font-size: 12px; color: var(--muted); margin: 3px 0 0 12px;
      display: flex; gap: 14px; align-items: center;
    }
    .cmt .sub .act { font-weight: 600; cursor: pointer; color: var(--muted); }
    .cmt .sub .act:hover { text-decoration: underline; }
    .cmt img.att { max-width: 220px; border-radius: 12px; display: block; margin-top: 6px; cursor: zoom-in; }
    .cmt-replies { margin: 6px 0 0 40px; }

    .reply-inline { display: flex; gap: 8px; margin: 6px 0 0 40px; }
    .reply-inline input { flex: 1; border-radius: 18px; font-size: 13px; padding: 7px 13px; background: #f0f2f5; border-color: transparent; }

    .cm-empty { flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; color: var(--muted); }
    .cm-empty .big { font-size: 42px; }

    /* dropdown เพจ (เหมือนหน้า Analytics) */
    .pg-dd { position: relative; }
    .pg-dd-btn {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 9px 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-weight: 600; font-family: inherit; color: var(--text); cursor: pointer;
    }
    .pg-dd-btn:hover { background: var(--bg); }
    .pg-dd-btn .caret { margin-left: auto; color: var(--muted); font-size: 11px; }
    .pg-dd-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 26px rgba(0,0,0,0.16); max-height: 55vh; overflow-y: auto; padding: 5px;
    }
    .pg-dd-menu.open { display: block; }
    .pg-dd-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; }
    .pg-dd-item:hover { background: var(--bg); }
    .pg-dd-item.active { background: #e7f0fe; color: var(--primary); font-weight: 600; }
    .pg-dd-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pg-ava, .pg-ava-fb {
      width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700;
    }

    @media (max-width: 800px) {
      .cm-layout { grid-template-columns: 1fr; }
      .cm-right { display: none; }
      .cm-layout.post-open .cm-left { display: none; }
      .cm-layout.post-open .cm-right { display: flex; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="logo">📥 FB Inbox Center</span>
    <a class="nav-link" href="index.html">Inbox</a>
    <a class="nav-link active" href="comments.html">Content</a>
    <a class="nav-link" href="analytics.html">Analytics</a>
    <a class="nav-link" href="connect.html">Setting</a>
    <span class="spacer"></span>
    <button class="btn small" id="refreshBtn">🔄 ดึงคอมเมนต์ใหม่</button>
  </nav>

  <div class="cm-layout" id="cmLayout">
    <!-- ซ้าย: เลือกเพจ + รายการโพสต์ -->
    <aside class="cm-left">
      <div class="cm-left-head">
        <div class="pg-dd" id="pgDd" style="min-width: 220px;">
          <button class="pg-dd-btn" id="pgDdBtn">
            <span id="pgDdAvaWrap" style="display:flex;"><span class="pg-ava-fb" style="background:var(--primary);">📄</span></span>
            <span id="pgDdLabel">เลือกเพจ...</span>
            <span class="caret">▼</span>
          </button>
          <div class="pg-dd-menu" id="pgDdMenu"></div>
        </div>
        <div class="cal-nav-group">
          <button class="cal-nav" id="calPrev">‹</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="cal-nav" id="calNext">›</button>
        </div>
      </div>
      <div class="cal-wrap" id="calWrap">
        <div class="cm-empty"><span class="big">📅</span>เลือกเพจเพื่อดูปฏิทินโพสต์</div>
      </div>
    </aside>

    <!-- ขวา: คอมเมนต์ของโพสต์ที่เลือก -->
    <main class="cm-right" id="cmRight">
      <div class="cm-empty">
        <span class="big">💬</span>
        <div>เลือกโพสต์จากด้านซ้ายเพื่อดูคอมเมนต์</div>
        <div class="muted">ตอบคอมเมนต์ในนามเพจได้จากตรงนี้เลย</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <!-- คลิกรูปเพื่อดูขนาดใหญ่ -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
    <img id="lightboxImg" alt="">
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let pages = [];
    let selectedPage = null;
    let posts = [];
    let activePostId = null;
    let calMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    const AVATAR_COLORS = [
      '#1877f2', '#e91e63', '#8e24aa', '#5e35b1', '#3949ab', '#00897b',
      '#f4511e', '#6d4c41', '#546e7a', '#c2185b', '#2e7d32', '#ef6c00',
    ];
    function avatarColor(key) {
      let h = 0;
      for (const ch of String(key || '?')) h = (h * 31 + ch.codePointAt(0)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function fmtAgo(iso) {
      const d = new Date(iso);
      const now = new Date();
      const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate());
      const diff = Math.round((startOfDay(now) - startOfDay(d)) / 86400e3);
      if (diff <= 0) return 'วันนี้ ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      if (diff === 1) return 'เมื่อวาน';
      return diff + ' วันก่อน';
    }

    function openLightbox(src) {
      $('lightboxImg').src = src;
      $('lightbox').classList.add('show');
    }

    // ---------- dropdown เพจ ----------
    function pgAvatarHtml(p, size) {
      const cls = size || '';
      const fallback = `<span class="pg-ava-fb" style="background:${avatarColor(p.id)};${p.pictureUrl ? 'display:none;' : ''}">${esc((p.name || '?')[0])}</span>`;
      if (!p.pictureUrl) return fallback;
      return `<img class="pg-ava" src="${esc(p.pictureUrl)}" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${fallback}`;
    }

    async function loadPages() {
      pages = await fetch('/api/pages').then((r) => r.json());
      pages.sort((a, b) => a.name.localeCompare(b.name, 'th'));
      $('pgDdMenu').innerHTML = pages.map((p) => `
        <div class="pg-dd-item ${selectedPage && selectedPage.id === p.id ? 'active' : ''}" onclick="selectPage('${esc(p.id)}')">
          ${pgAvatarHtml(p)}
          <span>${esc(p.name)}</span>
        </div>`).join('');
      // เลือกเพจแรกอัตโนมัติ
      if (!selectedPage && pages.length) selectPage(pages[0].id);
    }

    function selectPage(id) {
      selectedPage = pages.find((p) => p.id === id);
      if (!selectedPage) return;
      $('pgDdLabel').textContent = selectedPage.name;
      $('pgDdAvaWrap').innerHTML = pgAvatarHtml(selectedPage);
      $('pgDdMenu').classList.remove('open');
      loadPages(); // อัปเดต active ในเมนู
      loadPosts();
    }

    $('pgDdBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      $('pgDdMenu').classList.toggle('open');
    });
    document.addEventListener('click', () => $('pgDdMenu').classList.remove('open'));

    // ---------- โพสต์ (ปฏิทิน) ----------
    async function loadPosts() {
      if (!selectedPage) return;
      activePostId = null;
      $('calWrap').innerHTML = '<div class="cm-empty"><span class="big">⏳</span>กำลังดึงโพสต์...</div>';
      try {
        const res = await fetch(`/api/pages/${encodeURIComponent(selectedPage.id)}/posts`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        posts = data;
        // เด้งไปเดือนของโพสต์ล่าสุด เพื่อให้เห็นโพสต์ทันที
        if (posts.length) {
          const d = new Date(posts[0].createdTime);
          calMonth = new Date(d.getFullYear(), d.getMonth(), 1);
        }
        renderCalendar();
        // เปิดโพสต์ล่าสุดอัตโนมัติบนจอกว้าง
        if (posts.length && window.innerWidth > 800) openPost(posts[0].id);
        else if (!posts.length) $('cmRight').innerHTML = '<div class="cm-empty"><span class="big">📭</span>เพจนี้ยังไม่มีโพสต์</div>';
      } catch (err) {
        $('calWrap').innerHTML = `<div class="cm-empty" style="padding:20px; text-align:center;"><span class="big">⚠️</span>${esc(err.message)}</div>`;
      }
    }

    const dayKey = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    function engBadges(p) {
      const parts = [];
      if (p.reactionCount) parts.push(`👍 ${p.reactionCount}`);
      if (p.commentCount) parts.push(`💬 ${p.commentCount}`);
      if (p.shareCount) parts.push(`↗ ${p.shareCount}`);
      return parts;
    }

    function calPostHtml(p) {
      const eng = engBadges(p);
      return `
        <div class="cal-post ${p.id === activePostId ? 'active' : ''}" title="${esc(p.message)}" onclick="openPost('${esc(p.id)}')">
          ${p.picture ? `<img src="${esc(p.picture)}" alt="">` : ''}
          <div class="cp-txt">${esc(p.message)}</div>
          ${eng.length ? `<div class="cp-eng">${eng.map((e) => `<span>${e}</span>`).join('')}</div>` : ''}
        </div>`;
    }

    function renderCalendar() {
      $('calTitle').textContent = calMonth.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
      // จัดกลุ่มโพสต์ตามวัน
      const byDay = {};
      for (const p of posts) {
        const k = dayKey(new Date(p.createdTime));
        (byDay[k] = byDay[k] || []).push(p);
      }
      const firstDow = calMonth.getDay();
      const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0).getDate();
      const todayKey = dayKey(new Date());
      let cells = '';
      // ช่องว่างก่อนวันที่ 1 (ให้จันทร์เป็นคอลัมน์แรก → shift)
      const lead = (firstDow + 6) % 7;
      for (let i = 0; i < lead; i++) cells += '<div class="cal-cell empty"></div>';
      for (let day = 1; day <= daysInMonth; day++) {
        const k = dayKey(new Date(calMonth.getFullYear(), calMonth.getMonth(), day));
        const dayPosts = byDay[k] || [];
        cells += `
          <div class="cal-cell ${k === todayKey ? 'today' : ''}">
            <div class="daynum">${day}</div>
            ${dayPosts.map(calPostHtml).join('')}
          </div>`;
      }
      $('calWrap').innerHTML = `
        <div class="cal-dow"><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span><span>อา</span></div>
        <div class="cal-grid">${cells}</div>`;
    }

    $('calPrev').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() - 1, 1); renderCalendar(); });
    $('calNext').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 1); renderCalendar(); });

    // ---------- คอมเมนต์ ----------
    function cmtAvatar(c) {
      const fallback = `<span class="ava-fb" style="background:${avatarColor(c.fromId || c.fromName)};${c.fromPic ? 'display:none;' : ''}">${esc(c.fromName[0])}</span>`;
      if (!c.fromPic) return fallback;
      return `<img class="ava" src="${esc(c.fromPic)}" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${fallback}`;
    }

    function cmtHtml(c, isReply) {
      const byPage = selectedPage && c.fromId === selectedPage.id;
      return `
        <div class="cmt ${byPage ? 'by-page' : ''}">
          ${cmtAvatar(c)}
          <div class="box">
            <div class="bub"><div class="who">${esc(c.fromName)}${byPage ? ' · เพจ' : ''}</div>${c.message ? `<div class="txt">${esc(c.message)}</div>` : ''}</div>
            ${c.attachmentUrl ? `<img class="att" src="${esc(c.attachmentUrl)}" alt="" onclick="openLightbox(this.src)">` : ''}
            <div class="sub">
              ${!isReply ? `<span class="act" onclick="showReplyBox('${esc(c.id)}')">ตอบกลับ</span>` : ''}
              ${c.likeCount ? `<span>👍 ${c.likeCount}</span>` : ''}
              <span>${fmtAgo(c.createdTime)}</span>
            </div>
            ${!isReply ? `
              <div class="cmt-replies" id="replies-${esc(c.id)}" style="margin-left:0;">
                ${c.replies.map((r) => cmtHtml(r, true)).join('')}
              </div>
              <div class="reply-inline" id="replybox-${esc(c.id)}" style="display:none;">
                <input type="text" placeholder="ตอบในนาม ${esc(selectedPage ? selectedPage.name : 'เพจ')}..."
                  onkeydown="if(event.key==='Enter')sendReply('${esc(c.id)}');if(event.key==='Escape')this.parentElement.style.display='none';">
                <button class="btn small" onclick="sendReply('${esc(c.id)}')">ส่ง</button>
              </div>` : ''}
          </div>
        </div>`;
    }

    async function openPost(postId) {
      activePostId = postId;
      renderCalendar();
      $('cmLayout').classList.add('post-open');
      const post = posts.find((p) => p.id === postId);
      $('cmRight').innerHTML = '<div class="cm-empty"><span class="big">⏳</span>กำลังดึงคอมเมนต์...</div>';
      try {
        const res = await fetch(`/api/posts/${encodeURIComponent(postId)}/comments?pageId=${encodeURIComponent(selectedPage.id)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        $('cmRight').innerHTML = `
          <div class="cm-post-head">
            <button class="btn small secondary" onclick="closePost()" style="display:none; float:left; margin-right:10px;" id="backBtn">←</button>
            <div class="txt">${esc(post.message)}</div>
            <div class="muted" style="margin-top:4px;">
              ${fmtAgo(post.createdTime)}
              ${post.permalink ? ` · <a href="${esc(post.permalink)}" target="_blank">เปิดโพสต์บน Facebook ↗</a>` : ''}
            </div>
            <div class="eng-bar">
              <span class="eng">👍 <b>${post.reactionCount.toLocaleString()}</b> <span>ถูกใจ</span></span>
              <span class="eng">💬 <b>${data.length.toLocaleString()}</b> <span>คอมเมนต์</span></span>
              <span class="eng">↗ <b>${post.shareCount.toLocaleString()}</b> <span>แชร์</span></span>
            </div>
          </div>
          <div class="cm-list" id="cmList">
            ${data.length ? data.map((c) => cmtHtml(c, false)).join('')
              : '<div class="muted" style="text-align:center; padding: 30px;">โพสต์นี้ยังไม่มีคอมเมนต์</div>'}
          </div>`;
        if (window.innerWidth <= 800) $('backBtn').style.display = 'inline-flex';
      } catch (err) {
        $('cmRight').innerHTML = `<div class="cm-empty"><span class="big">⚠️</span><div style="max-width:420px; text-align:center;">${esc(err.message)}</div></div>`;
      }
    }

    function closePost() {
      $('cmLayout').classList.remove('post-open');
    }

    function showReplyBox(commentId) {
      const box = $('replybox-' + commentId);
      box.style.display = 'flex';
      box.querySelector('input').focus();
    }

    async function sendReply(commentId) {
      const box = $('replybox-' + commentId);
      const input = box.querySelector('input');
      const text = input.value.trim();
      if (!text) return;
      const btn = box.querySelector('button');
      btn.disabled = true; input.disabled = true;
      try {
        const res = await fetch(`/api/comments/${encodeURIComponent(commentId)}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId: selectedPage.id, message: text }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        // เติม reply ที่ส่งแล้วเข้าไปใต้คอมเมนต์ทันที
        $('replies-' + commentId).insertAdjacentHTML('beforeend', cmtHtml({
          id: data.id, message: text, createdTime: new Date().toISOString(),
          fromId: selectedPage.id, fromName: data.pageName, fromPic: selectedPage.pictureUrl || '',
          likeCount: 0, attachmentUrl: '', replies: [],
        }, true));
        input.value = '';
        box.style.display = 'none';
        toast('ตอบคอมเมนต์แล้ว ✓');
      } catch (err) {
        toast('❌ ' + err.message);
      } finally {
        btn.disabled = false; input.disabled = false;
      }
    }

    $('refreshBtn').addEventListener('click', () => {
      if (activePostId) { loadPosts(); }
      else loadPosts();
    });

    loadPages();
  </script>
</body>
</html>
