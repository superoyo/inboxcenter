<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กล่องข้อความรวม — Facebook Inbox Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <span class="logo">📥 Facebook Inbox Center</span>
    <a class="nav-link active" href="index.html">กล่องข้อความรวม</a>
    <a class="nav-link" href="connect.html">เชื่อมต่อเพจ</a>
    <span class="spacer"></span>
    <span class="muted" id="syncStatusLabel" style="font-size: 12px; margin-right: 10px;"></span>
    <button class="btn small" id="syncAllBtn">🔄 ดึง inbox ทุกเพจ</button>
  </nav>

  <div class="inbox-layout" id="layout">
    <!-- ซ้ายสุด: เลือกเพจ + ปฏิทินสรุปจำนวน inbox รายวัน -->
    <aside class="cal-panel">
      <div class="page-list-panel">
        <input type="text" id="pageSearchInput" class="page-search" placeholder="🔍 ค้นหาเพจ..." autocomplete="off">
        <div class="page-list-items" id="pageListItems"></div>
      </div>
      <div class="cal-head">
        <button class="cal-nav" id="calPrev">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="cal-nav" id="calNext">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <button class="btn small secondary" id="calClear" style="margin: 12px 16px; display: none;">✕ แสดงทุกวัน</button>
      <p class="muted" style="padding: 0 16px;">ตัวเลขใต้วันที่ = จำนวนการสนทนาที่มีข้อความในวันนั้น คลิกเพื่อกรอง</p>
    </aside>

    <!-- ซ้าย: รายการสนทนาจากทุกเพจ -->
    <aside class="conv-panel">
      <div class="panel-head">
        <h2>กล่องข้อความรวม</h2>
        <div class="filters">
          <select id="pageFilter" style="flex: 1;">
            <option value="">ทุกเพจ</option>
          </select>
          <input type="text" id="searchInput" placeholder="ค้นหาชื่อ / ข้อความ..." style="flex: 1.4;">
        </div>
      </div>
      <div class="conv-list" id="convList">
        <div class="empty-state"><span class="big">⏳</span>กำลังโหลด...</div>
      </div>
    </aside>

    <!-- ขวา: ข้อความในสนทนาที่เลือก -->
    <main class="thread-panel" id="threadPanel">
      <div class="empty-state">
        <span class="big">💬</span>
        <div>เลือกการสนทนาจากด้านซ้ายเพื่อดูข้อความ</div>
        <div class="muted">ข้อความจากทุกเพจจะมารวมอยู่ที่นี่</div>
      </div>
    </main>

    <!-- ขวาสุด: สถิติของลูกค้าที่เลือก -->
    <aside class="stats-panel" id="statsPanel"></aside>
  </div>

  <div class="toast" id="toast"></div>

  <!-- คลิกรูปแนบเพื่อดูขนาดใหญ่ -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
    <img id="lightboxImg" alt="">
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let conversations = [];
    let activeConvId = null;
    let calMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let selectedDate = null; // 'YYYY-MM-DD' — กรองรายการสนทนาตามวันที่เลือกในปฏิทิน
    let pages = [];
    let selectedPageId = ''; // '' = ทุกเพจ

    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    // วันนี้ (พร้อมเวลา) / เมื่อวาน / ผ่านมาแล้ว X วัน
    function fmtTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      const startOfDay = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate());
      const dayDiff = Math.round((startOfDay(now) - startOfDay(d)) / 86400e3);
      if (dayDiff <= 0) return 'วันนี้ ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      if (dayDiff === 1) return 'เมื่อวาน';
      return dayDiff + ' วันก่อน';
    }

    function fmtFull(iso) {
      return new Date(iso).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
    }

    // สีประจำตัวลูกค้า — hash จาก id/ชื่อ ให้แต่ละคนได้สีเดิมเสมอ
    const AVATAR_COLORS = [
      '#1877f2', '#e91e63', '#8e24aa', '#5e35b1', '#3949ab', '#00897b',
      '#f4511e', '#6d4c41', '#546e7a', '#c2185b', '#2e7d32', '#ef6c00',
    ];
    function avatarColor(key) {
      let h = 0;
      for (const ch of String(key || '?')) h = (h * 31 + ch.codePointAt(0)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    // รูปโปรไฟล์จริง + fallback เป็นตัวอักษรบนพื้นสีประจำตัวเมื่อไม่มีรูปหรือรูปหมดอายุ
    function avatarHtml(pic, name, key) {
      const style = `background:${avatarColor(key || name)};${pic ? 'display:none;' : ''}`;
      const fallback = `<div class="avatar-fallback" style="${style}">${esc((name || '?')[0])}</div>`;
      if (!pic) return fallback;
      return `<img class="avatar-img" src="${esc(pic)}" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${fallback}`;
    }

    async function loadPagesFilter() {
      pages = await fetch('/api/pages').then((r) => r.json());
      // dropdown สำรองสำหรับจอแคบ (ปฏิทิน/รายการเพจถูกซ่อน)
      const sel = $('pageFilter');
      sel.innerHTML = '<option value="">ทุกเพจ (' + pages.length + ')</option>' +
        pages.map((p) => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
      sel.value = selectedPageId;
      renderPageListPanel();
      return pages.length;
    }

    // รูปโปรไฟล์เพจ + fallback ตัวอักษร
    function pageAvatarHtml(p) {
      const fallback = `<div class="page-avatar-fallback" style="background:${avatarColor(p.id)};${p.pictureUrl ? 'display:none;' : ''}">${esc((p.name || '?')[0])}</div>`;
      if (!p.pictureUrl) return fallback;
      return `<img class="page-avatar" src="${esc(p.pictureUrl)}" alt=""
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${fallback}`;
    }

    function renderPageListPanel() {
      const q = ($('pageSearchInput').value || '').trim().toLowerCase();
      const shown = q ? pages.filter((p) => p.name.toLowerCase().includes(q)) : pages;
      $('pageListItems').innerHTML = `
        <div class="page-list-item ${!selectedPageId ? 'active' : ''}" onclick="selectPage('')">
          <div class="page-avatar-fallback" style="background:var(--primary);">∀</div>
          <span>ทุกเพจ (${pages.length})</span>
        </div>` +
        shown.map((p) => `
          <div class="page-list-item ${selectedPageId === p.id ? 'active' : ''}" onclick="selectPage('${esc(p.id)}')">
            ${pageAvatarHtml(p)}
            <span>${esc(p.name)}</span>
          </div>`).join('') +
        (q && !shown.length ? '<div class="muted" style="padding:8px 10px;">ไม่พบเพจที่ค้นหา</div>' : '');
    }

    $('pageSearchInput').addEventListener('input', renderPageListPanel);

    function selectPage(id) {
      selectedPageId = id;
      $('pageFilter').value = id;
      renderPageListPanel();
      loadConversations();
    }

    async function loadConversations() {
      const params = new URLSearchParams();
      if (selectedPageId) params.set('pageId', selectedPageId);
      if ($('searchInput').value.trim()) params.set('q', $('searchInput').value.trim());
      conversations = await fetch('/api/conversations?' + params).then((r) => r.json());
      renderCalendar();
      renderConvList();
    }

    // ---------- ปฏิทิน ----------
    function dateKey(d) {
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    // นับจำนวน "การสนทนา" ที่มีข้อความอย่างน้อย 1 ข้อความในแต่ละวัน
    function dailyCounts() {
      const map = {};
      for (const c of conversations) {
        const days = new Set(c.messages.map((m) => dateKey(new Date(m.createdTime))));
        for (const day of days) (map[day] = map[day] || new Set()).add(c.id);
      }
      return Object.fromEntries(Object.entries(map).map(([k, v]) => [k, v.size]));
    }

    function renderCalendar() {
      const counts = dailyCounts();
      $('calTitle').textContent = calMonth.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });

      const firstDow = calMonth.getDay();
      const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0).getDate();
      const todayKey = dateKey(new Date());

      let html = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map((d) => `<div class="cal-dow">${d}</div>`).join('');
      html += '<div class="cal-cell empty"></div>'.repeat(firstDow);
      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(new Date(calMonth.getFullYear(), calMonth.getMonth(), day));
        const n = counts[key] || 0;
        const cls = ['cal-cell', n ? 'has-count' : '', key === selectedDate ? 'selected' : '', key === todayKey ? 'today' : ''].join(' ');
        html += `
          <div class="${cls}" ${n ? `onclick="selectCalDate('${key}')"` : ''}>
            <span class="cal-day">${day}</span>
            ${n ? `<span class="cal-count">${n}</span>` : ''}
          </div>`;
      }
      $('calGrid').innerHTML = html;
      $('calClear').style.display = selectedDate ? 'inline-flex' : 'none';
    }

    function selectCalDate(key) {
      selectedDate = selectedDate === key ? null : key; // คลิกซ้ำ = ยกเลิกกรอง
      renderCalendar();
      renderConvList();
    }

    $('calPrev').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() - 1, 1); renderCalendar(); });
    $('calNext').addEventListener('click', () => { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 1); renderCalendar(); });
    $('calClear').addEventListener('click', () => { selectedDate = null; renderCalendar(); renderConvList(); });

    // ---------- รายการสนทนา ----------
    function visibleConversations() {
      if (!selectedDate) return conversations;
      return conversations.filter((c) =>
        c.messages.some((m) => dateKey(new Date(m.createdTime)) === selectedDate));
    }

    function renderConvList() {
      const list = $('convList');
      const shown = visibleConversations();
      if (selectedDate && !shown.length) {
        list.innerHTML = `
          <div class="empty-state">
            <span class="big">📅</span>
            <div>ไม่มีข้อความในวันที่เลือก</div>
          </div>`;
        return;
      }
      if (!shown.length) {
        list.innerHTML = `
          <div class="empty-state">
            <span class="big">📭</span>
            <div>ยังไม่มีข้อความ</div>
            <div class="muted">ไปที่หน้า <a href="connect.html">เชื่อมต่อเพจ</a> เพื่อเพิ่มเพจและดึง inbox</div>
          </div>`;
        return;
      }
      list.innerHTML = shown.map((c) => {
        const last = c.messages[c.messages.length - 1];
        const preview = last
          ? (last.isFromPage ? 'คุณ: ' : '') + (last.text || '📎 ไฟล์แนบ')
          : 'ไม่มีข้อความ';
        return `
          <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConv('${esc(c.id)}')">
            ${avatarHtml(c.customerPic, c.customerName, c.customerId)}
            <div class="conv-body">
              <div class="top-row">
                <span class="cust-name">${esc(c.customerName)}</span>
                <span class="time">${fmtTime(c.updatedTime)}</span>
              </div>
              <div class="preview">${esc(preview)}</div>
              <div class="page-tag">📄 ${esc(c.pageName)}</div>
              ${(c.tags && c.tags.length)
                ? `<div>${c.tags.map((t) => `<span class="tag-chip">${esc(t)}</span>`).join('')}</div>`
                : ''}
            </div>
            ${c.unreadCount > 0 ? '<div class="unread-dot"></div>' : ''}
          </div>`;
      }).join('');
    }

    function openConv(id) {
      activeConvId = id;
      const c = conversations.find((x) => x.id === id);
      if (!c) return;
      renderConvList();
      $('layout').classList.add('thread-open');

      const panel = $('threadPanel');
      panel.innerHTML = `
        <div class="thread-head">
          <button class="btn small secondary" onclick="closeThread()" style="display:none;" id="backBtn">←</button>
          ${avatarHtml(c.customerPic, c.customerName, c.customerId)}
          <div style="flex: 1; min-width: 0;">
            <div class="name">${esc(c.customerName)}</div>
            <div class="muted">ผ่านเพจ: ${esc(c.pageName)}</div>
            <div class="thread-tags" id="threadTags"></div>
          </div>
        </div>
        <div class="thread-messages" id="msgArea">
          ${(() => {
            // จับเวลาตอบ: ข้อความแรกของเพจหลังลูกค้าถาม จะแสดงว่าตอบช้าไปเท่าไหร่
            let lastAsk = null, answered = true;
            return c.messages.map((m) => {
              let latency = '';
              const t = new Date(m.createdTime);
              if (!m.isFromPage) { lastAsk = t; answered = false; }
              else if (!answered && lastAsk) { latency = `(ตอบหลังถาม ${fmtDur(t - lastAsk)})`; answered = true; }
              return `
            <div class="msg-row ${m.isFromPage ? 'from-page' : ''}">
              <div class="bubble">
                ${esc(m.text)}
                ${m.attachments.map((a) => a.imageUrl
                  ? `<img class="attach" src="${esc(a.imageUrl)}" alt="attachment" onclick="openLightbox(this.src)">`
                  : a.fileUrl ? `<div>📎 <a href="${esc(a.fileUrl)}" target="_blank">${esc(a.name || 'ไฟล์แนบ')}</a></div>` : ''
                ).join('')}
                <div class="meta">
                  <span class="meta-time">${t.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.</span>
                  · ${esc(m.isFromPage ? c.pageName : m.fromName)} · ${t.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' })}
                  ${latency ? `<span class="meta-latency">${latency}</span>` : ''}
                </div>
              </div>
            </div>`;
            }).join('');
          })()}
        </div>
        <div class="reply-bar">
          <input type="text" id="replyInput" placeholder="พิมพ์ข้อความตอบกลับในนาม ${esc(c.pageName)}..." autocomplete="off">
          <button class="btn" id="replySendBtn">ส่ง</button>
        </div>`;
      if (window.innerWidth <= 800) $('backBtn').style.display = 'inline-flex';
      renderThreadTags(c);
      renderStatsPanel(c);
      $('layout').classList.add('stats-open');
      const area = $('msgArea');
      area.scrollTop = area.scrollHeight;

      $('replySendBtn').addEventListener('click', () => sendReply(c.id));
      $('replyInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendReply(c.id); });
      $('replyInput').focus();
    }

    async function sendReply(convId) {
      const input = $('replyInput');
      const text = input.value.trim();
      if (!text) return;
      const btn = $('replySendBtn');
      btn.disabled = true; input.disabled = true;
      try {
        const res = await fetch(`/api/conversations/${encodeURIComponent(convId)}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        // เติมข้อความที่ส่งแล้วต่อท้ายแชททันที
        const c = conversations.find((x) => x.id === convId);
        if (c) { c.messages.push(data.message); c.updatedTime = data.message.createdTime; }
        const area = $('msgArea');
        area.insertAdjacentHTML('beforeend', `
          <div class="msg-row from-page">
            <div class="bubble">
              ${esc(data.message.text)}
              <div class="meta">${esc(data.message.fromName)} · ${fmtFull(data.message.createdTime)}</div>
            </div>
          </div>`);
        area.scrollTop = area.scrollHeight;
        input.value = '';
        renderConvList();
      } catch (err) {
        toast(err.message);
      } finally {
        btn.disabled = false; input.disabled = false; input.focus();
      }
    }

    // ---------- Lightbox ----------
    function openLightbox(src) {
      $('lightboxImg').src = src;
      $('lightbox').classList.add('show');
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') $('lightbox').classList.remove('show');
    });

    // ---------- Tags ----------
    function renderThreadTags(c) {
      const el = $('threadTags');
      if (!el) return;
      el.innerHTML =
        (c.tags || []).map((t, i) =>
          `<span class="tag-chip">${esc(t)}<b title="ลบแท็ก" onclick="removeTag('${esc(c.id)}', ${i})">×</b></span>`
        ).join('') +
        `<button class="tag-add" onclick="showTagInput()">🏷 เพิ่มแท็ก</button>
         <input id="tagInput" class="tag-input" style="display:none;" placeholder="พิมพ์แล้วกด Enter" maxlength="30">`;
      $('tagInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addTag(c.id);
        if (e.key === 'Escape') { e.target.style.display = 'none'; e.target.value = ''; }
      });
    }

    function showTagInput() {
      const inp = $('tagInput');
      inp.style.display = 'inline-block';
      inp.focus();
    }

    async function addTag(convId) {
      const inp = $('tagInput');
      const val = inp.value.trim();
      if (!val) return;
      const c = conversations.find((x) => x.id === convId);
      await saveTags(convId, [...(c.tags || []), val]);
    }

    async function removeTag(convId, idx) {
      const c = conversations.find((x) => x.id === convId);
      await saveTags(convId, (c.tags || []).filter((_, i) => i !== idx));
    }

    async function saveTags(convId, tags) {
      try {
        const res = await fetch(`/api/conversations/${encodeURIComponent(convId)}/tags`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tags }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const c = conversations.find((x) => x.id === convId);
        if (c) { c.tags = data.tags; renderThreadTags(c); renderConvList(); renderStatsPanel(c); }
      } catch (err) {
        toast(err.message || 'บันทึกแท็กไม่สำเร็จ');
      }
    }

    function closeThread() {
      $('layout').classList.remove('thread-open');
      $('layout').classList.remove('stats-open');
      activeConvId = null;
      renderConvList();
    }

    // ---------- สถิติลูกค้า ----------
    function fmtDur(ms) {
      if (ms < 60e3) return Math.max(1, Math.round(ms / 1e3)) + ' วินาที';
      if (ms < 3600e3) return Math.round(ms / 60e3) + ' นาที';
      if (ms < 86400e3) return (ms / 3600e3).toFixed(1) + ' ชั่วโมง';
      return (ms / 86400e3).toFixed(1) + ' วัน';
    }

    // ข้อความจากเพจที่ซ้ำกัน ≥3 ครั้งในเพจเดียวกัน = ข้อความอัตโนมัติ (bot)
    function botReplyTexts(pageId) {
      const counts = {};
      for (const conv of conversations) {
        if (conv.pageId !== pageId) continue;
        for (const m of conv.messages) {
          if (m.isFromPage && m.text) counts[m.text] = (counts[m.text] || 0) + 1;
        }
      }
      return new Set(Object.entries(counts).filter(([, n]) => n >= 3).map(([t]) => t));
    }

    function renderStatsPanel(c) {
      const cust = c.messages.filter((m) => !m.isFromPage);

      // 1) ติดต่อครั้งแรก
      const firstMsg = cust[0] || c.messages[0];
      let firstHtml = '<span class="muted">—</span>';
      if (firstMsg) {
        const t = new Date(firstMsg.createdTime);
        const daysAgo = Math.floor((Date.now() - t) / 86400e3);
        firstHtml = `${t.toLocaleDateString('th-TH', { dateStyle: 'medium' })}<br>
          <span class="muted">${daysAgo === 0 ? 'วันนี้' : daysAgo + ' วันที่แล้ว'}</span>`;
      }

      // 2) กราฟช่วงเวลาที่ทักเข้ามา (0-24 น.)
      const hours = Array(24).fill(0);
      cust.forEach((m) => hours[new Date(m.createdTime).getHours()]++);
      const maxH = Math.max(...hours, 1);
      const peakHour = hours.indexOf(Math.max(...hours));
      const hourChart = `
        <div class="hour-chart">
          ${hours.map((h, i) => `
            <div class="hour-bar${h === maxH && h > 0 ? ' peak' : ''}" style="height:${h ? Math.max(8, Math.round(h / maxH * 100)) : 2}%"
              title="${String(i).padStart(2, '0')}:00 น. — ${h} ข้อความ"></div>`).join('')}
        </div>
        <div class="hour-axis"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>
        ${cust.length ? `<div class="muted" style="margin-top:4px;">ถามบ่อยช่วง ${String(peakHour).padStart(2, '0')}:00–${String(peakHour + 1).padStart(2, '0')}:00 น.</div>` : ''}`;

      // 3) ความถี่ในการติดต่อ
      const days = [...new Set(cust.map((m) => dateKey(new Date(m.createdTime))))].sort();
      let freqHtml = '<span class="muted">ติดต่อครั้งเดียว</span>';
      if (days.length >= 2) {
        const span = (new Date(days[days.length - 1]) - new Date(days[0])) / 86400e3;
        freqHtml = `เฉลี่ยทุก ${Math.max(1, Math.round(span / (days.length - 1)))} วัน<br>
          <span class="muted">ติดต่อมา ${days.length} วัน (${cust.length} ข้อความ)</span>`;
      }

      // 4-5) เวลาตอบกลับ แยกคน / bot
      const botSet = botReplyTexts(c.pageId);
      const human = [], bot = [];
      let pending = null;
      for (const m of c.messages) {
        if (!m.isFromPage) {
          if (pending === null) pending = new Date(m.createdTime);
        } else if (pending !== null) {
          const d = new Date(m.createdTime) - pending;
          (m.text && botSet.has(m.text) ? bot : human).push(d);
          pending = null;
        }
      }
      const avg = (a) => a.reduce((s, x) => s + x, 0) / a.length;
      const humanHtml = human.length
        ? `เฉลี่ย ${fmtDur(avg(human))}<br><span class="muted">ตอบ ${human.length} ครั้ง (เร็วสุด ${fmtDur(Math.min(...human))})</span>`
        : '<span class="muted">ยังไม่มีการตอบด้วยคน</span>';
      const botHtml = bot.length
        ? `เฉลี่ย ${fmtDur(avg(bot))}<br><span class="muted">ตอบ ${bot.length} ครั้ง (ข้อความซ้ำอัตโนมัติ)</span>`
        : '<span class="muted">ไม่พบการตอบด้วย bot</span>';

      $('statsPanel').innerHTML = `
        <div class="stats-head">
          <span>📊 สถิติลูกค้า</span>
          <button class="btn small secondary" onclick="$('layout').classList.remove('stats-open')">✕</button>
        </div>
        <div class="stats-body">
          <div class="stats-cust">
            ${avatarHtml(c.customerPic, c.customerName, c.customerId)}
            <div>
              <div style="font-weight:700;">${esc(c.customerName)}</div>
              <div class="muted">${esc(c.pageName)}</div>
            </div>
          </div>

          <div class="stat-block"><div class="stat-label">🕐 ติดต่อครั้งแรก</div><div>${firstHtml}</div></div>
          <div class="stat-block"><div class="stat-label">📈 ช่วงเวลาที่ทักเข้ามา</div>${hourChart}</div>
          <div class="stat-block"><div class="stat-label">🔁 ความถี่ในการติดต่อ</div><div>${freqHtml}</div></div>
          <div class="stat-block"><div class="stat-label">🙋 การตอบด้วยคน</div><div>${humanHtml}</div></div>
          <div class="stat-block"><div class="stat-label">🤖 การตอบด้วย bot</div><div>${botHtml}</div></div>

          <div class="stat-block">
            <div class="stat-label">🏷 แท็ก</div>
            <div>${(c.tags || []).map((t) => `<span class="tag-chip">${esc(t)}</span>`).join('') || '<span class="muted">ยังไม่มีแท็ก — เพิ่มได้ที่หัวแชท</span>'}</div>
          </div>

          <div class="stat-block">
            <div class="stat-label">📝 โน้ต (Remark)</div>
            <textarea id="remarkInput" rows="4" placeholder="บันทึกโน้ตเกี่ยวกับลูกค้าคนนี้...">${esc(c.remark || '')}</textarea>
            <button class="btn small" style="margin-top:8px;" onclick="saveRemark('${esc(c.id)}')">บันทึกโน้ต</button>
          </div>

          <p class="muted" style="font-size:11px;">* คำนวณจากประวัติ ${c.messages.length} ข้อความล่าสุดที่ดึงมา</p>
        </div>`;
    }

    async function saveRemark(convId) {
      try {
        const res = await fetch(`/api/conversations/${encodeURIComponent(convId)}/remark`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ remark: $('remarkInput').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        const c = conversations.find((x) => x.id === convId);
        if (c) c.remark = data.remark;
        toast('บันทึกโน้ตแล้ว');
      } catch (err) {
        toast(err.message || 'บันทึกโน้ตไม่สำเร็จ');
      }
    }

    // สถานะการ refresh: อัปเดตล่าสุดเมื่อไหร่ + รอบอัตโนมัติถัดไป
    async function loadSyncStatus() {
      try {
        const s = await fetch('/api/sync-status').then((r) => r.json());
        const el = $('syncStatusLabel');
        if (s.running) { el.textContent = '⏳ กำลังดึงข้อมูล...'; return; }
        const fmt = (iso) => new Date(iso).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        el.textContent = s.lastRefreshAt
          ? `อัปเดตล่าสุด ${fmt(s.lastRefreshAt)} น. · รอบถัดไป ${fmt(s.nextRefreshAt)} น.`
          : `ยังไม่เคยดึงข้อมูล · รอบอัตโนมัติ ${fmt(s.nextRefreshAt)} น.`;
        el.title = `ระบบดึงข้อมูลใหม่อัตโนมัติทุก ${s.autoRefreshMinutes} นาที (เฉพาะส่วนที่เพิ่มเติม)`;
      } catch { /* เงียบไว้ ไม่ให้รบกวนหน้าจอ */ }
    }

    $('syncAllBtn').addEventListener('click', async () => {
      const btn = $('syncAllBtn');
      btn.disabled = true; btn.textContent = 'กำลังดึง...';
      try {
        const { results } = await fetch('/api/sync-all', { method: 'POST' }).then((r) => r.json());
        const ok = results.filter((r) => r.ok).length;
        const fail = results.filter((r) => !r.ok);
        const updated = results.reduce((s, r) => s + (r.conversations || 0), 0);
        toast(results.length === 0
          ? 'ยังไม่มีเพจในระบบ — ไปที่หน้าเชื่อมต่อเพจก่อน'
          : fail.length ? `สำเร็จ ${ok} เพจ, ล้มเหลว ${fail.length} เพจ` : `ดึงครบ ${ok} เพจ — มีความเคลื่อนไหว ${updated} ห้อง`);
        await loadConversations();
        await loadSyncStatus();
      } finally {
        btn.disabled = false; btn.textContent = '🔄 ดึง inbox ทุกเพจ';
      }
    });

    $('pageFilter').addEventListener('change', (e) => selectPage(e.target.value));
    let searchTimer;
    $('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadConversations, 300);
    });

    loadPagesFilter().then(loadConversations);
    loadSyncStatus();
    // รีเฟรชรายการ + สถานะอัตโนมัติทุก 60 วินาที (ข้อมูลจาก storage ในเครื่อง server)
    setInterval(() => { loadConversations(); loadSyncStatus(); }, 60000);
  </script>
</body>
</html>
