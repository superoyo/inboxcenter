<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรเจกต์ — FB Inbox Center</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
  <style>
    .pj-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }
    .pj-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .pj-head h1 { font-size: 26px; }
    .pj-head .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .pj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    /* การ์ดสร้างใหม่ */
    .pj-new {
      border: 2px dashed var(--border); border-radius: 14px; min-height: 220px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; cursor: pointer; color: var(--text); text-align: center; padding: 20px;
    }
    .pj-new:hover { border-color: var(--primary); background: #f5f9ff; }
    .pj-new .plus { width: 60px; height: 60px; border-radius: 14px; background: #e7f0fe; color: var(--primary); font-size: 30px; display: flex; align-items: center; justify-content: center; }
    .pj-new h3 { font-size: 17px; }
    .pj-new p { color: var(--muted); font-size: 13px; max-width: 190px; }
    /* การ์ดโปรเจกต์ */
    .pj-card { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--card); cursor: pointer; display: flex; flex-direction: column; transition: box-shadow 0.15s; }
    .pj-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.10); }
    .pj-thumb { height: 120px; background: linear-gradient(135deg, #2a78d6, #6da7ec); display: flex; align-items: center; justify-content: center; position: relative; }
    .pj-thumb .pj-emoji { font-size: 44px; }
    .pj-avatars { position: absolute; bottom: 8px; left: 10px; display: flex; }
    .pj-avatars img, .pj-avatars .fb { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; margin-left: -8px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .pj-avatars img:first-child, .pj-avatars .fb:first-child { margin-left: 0; }
    .pj-body { padding: 14px 16px; flex: 1; }
    .pj-body h3 { font-size: 17px; margin-bottom: 4px; }
    .pj-body .desc { color: var(--muted); font-size: 13px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pj-foot { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid var(--bg); font-size: 12px; color: var(--muted); }
    .pj-foot .btns { display: flex; gap: 4px; }
    .pj-foot button { border: none; background: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 4px 8px; border-radius: 6px; }
    .pj-foot button:hover { background: var(--bg); color: var(--text); }
    .pj-foot button.del:hover { color: var(--red); background: #fdeaee; }

    /* modal สร้าง/แก้ไข */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--card); border-radius: 14px; width: 640px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-head h2 { font-size: 18px; }
    .modal-body { padding: 18px 20px; overflow-y: auto; }
    .modal-body label { display: block; font-weight: 700; font-size: 13px; margin: 4px 0 6px; }
    .modal-body input, .modal-body textarea { margin-bottom: 14px; }
    /* drag & drop 2 คอลัมน์ */
    .dnd { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .dnd-col { border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; min-height: 240px; }
    .dnd-col h4 { font-size: 12px; font-weight: 700; color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--bg); }
    .dnd-list { flex: 1; overflow-y: auto; padding: 8px; min-height: 180px; }
    .dnd-list.over { background: #f5f9ff; }
    .dnd-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: grab; font-size: 13px; background: var(--card); }
    .dnd-item:active { cursor: grabbing; }
    .dnd-item.dragging { opacity: 0.4; }
    .dnd-item img, .dnd-item .fb { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .dnd-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .dnd-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 24px 10px; }
    .modal-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <span class="logo">📥 FB Inbox Center</span>
    <span class="nav-link active">โปรเจกต์</span>
    <span class="spacer"></span>
    <a class="nav-link" href="connect.html">Connect</a>
  </nav>

  <div class="pj-wrap">
    <div class="pj-head">
      <div>
        <h1>โปรเจกต์ทั้งหมด</h1>
        <div class="sub">จัดกลุ่มเพจเป็นโปรเจกต์ แล้วเข้าไปจัดการ Inbox · Content · Analytics · Report ของกลุ่มนั้น</div>
      </div>
    </div>
    <div class="pj-grid" id="pjGrid">
      <div class="pj-new" onclick="openModal()"><div class="plus">+</div><h3>สร้างโปรเจกต์ใหม่</h3><p>เลือกเพจเข้ากลุ่มด้วยการลากวาง</p></div>
    </div>
  </div>

  <!-- modal สร้าง/แก้ไข -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalTitle">สร้างโปรเจกต์ใหม่</h2>
        <button class="btn small secondary" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label>ชื่อโปรเจกต์</label>
        <input type="text" id="mName" placeholder="เช่น กลุ่มแบรนด์ Sahapat" autocomplete="off">
        <label>คำอธิบาย (ไม่บังคับ)</label>
        <input type="text" id="mDesc" placeholder="รายละเอียดสั้นๆ ของโปรเจกต์" autocomplete="off">
        <label>เลือกเพจเข้าโปรเจกต์ — ลากเพจจากซ้ายไปขวา</label>
        <div class="dnd">
          <div class="dnd-col">
            <h4>เพจทั้งหมด</h4>
            <div class="dnd-list" id="poolList" data-zone="pool"></div>
          </div>
          <div class="dnd-col">
            <h4>เพจในโปรเจกต์นี้ (<span id="selCount">0</span>)</h4>
            <div class="dnd-list" id="selList" data-zone="sel"></div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn secondary" onclick="closeModal()">ยกเลิก</button>
        <button class="btn" id="mSave" onclick="saveProject()">บันทึกโปรเจกต์</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    let pages = [], projects = [], editingId = null;

    function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
    function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    const AVATAR_COLORS=['#1877f2','#e91e63','#8e24aa','#5e35b1','#3949ab','#00897b','#f4511e','#6d4c41','#546e7a','#c2185b','#2e7d32','#ef6c00'];
    function avatarColor(k){ let h=0; for(const ch of String(k||'?')) h=(h*31+ch.codePointAt(0))>>>0; return AVATAR_COLORS[h%AVATAR_COLORS.length]; }
    function ava(p, cls){ return p.pictureUrl ? `<img src="${esc(p.pictureUrl)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'fb',textContent:'${esc((p.name||'?')[0])}'}))">` : `<span class="fb" style="background:${avatarColor(p.id)}">${esc((p.name||'?')[0])}</span>`; }
    const fmtAgo=(iso)=>{ if(!iso) return ''; const d=Math.floor((Date.now()-new Date(iso))/86400e3); return d<=0?'วันนี้':d===1?'เมื่อวาน':d+' วันก่อน'; };

    async function load(){
      [pages, projects] = await Promise.all([
        fetch('/api/pages').then(r=>r.json()),
        fetch('/api/projects').then(r=>r.json()),
      ]);
      pages.sort((a,b)=>a.name.localeCompare(b.name,'th'));
      renderGrid();
    }

    function renderGrid(){
      const cards = projects.map((pj)=>{
        const inPages = pj.pageIds.map(id=>pages.find(p=>p.id===id)).filter(Boolean);
        const avatars = inPages.slice(0,5).map(p=>ava(p)).join('');
        const emoji = ['🗂','📁','🏢','🌐','📊','✨'][ (pj.name.charCodeAt(0)||0) % 6 ];
        return `
          <div class="pj-card" onclick="openProject('${esc(pj.id)}')">
            <div class="pj-thumb" style="background:linear-gradient(135deg, ${avatarColor(pj.id)}, #6da7ec)">
              <span class="pj-emoji">${emoji}</span>
              <div class="pj-avatars">${avatars || ''}</div>
            </div>
            <div class="pj-body">
              <h3>${esc(pj.name)}</h3>
              <div class="desc">${esc(pj.description || (inPages.length+' เพจในโปรเจกต์'))}</div>
            </div>
            <div class="pj-foot">
              <span>🗂 ${pj.pageIds.length} เพจ · ${fmtAgo(pj.createdAt)}</span>
              <span class="btns" onclick="event.stopPropagation()">
                <button onclick="editProject('${esc(pj.id)}')">✎ แก้ไข</button>
                <button class="del" onclick="removeProject('${esc(pj.id)}','${esc(pj.name).replace(/'/g,"\\'")}')">🗑</button>
              </span>
            </div>
          </div>`;
      }).join('');
      $('pjGrid').innerHTML =
        `<div class="pj-new" onclick="openModal()"><div class="plus">+</div><h3>สร้างโปรเจกต์ใหม่</h3><p>เลือกเพจเข้ากลุ่มด้วยการลากวาง</p></div>` + cards;
    }

    function openProject(id){ location.href = 'index.html?project=' + encodeURIComponent(id); }

    // ---------- modal + drag & drop ----------
    function openModal(project){
      editingId = project ? project.id : null;
      $('modalTitle').textContent = project ? 'แก้ไขโปรเจกต์' : 'สร้างโปรเจกต์ใหม่';
      $('mName').value = project ? project.name : '';
      $('mDesc').value = project ? project.description : '';
      const selected = new Set(project ? project.pageIds : []);
      renderDnd(selected);
      $('modalBg').classList.add('open');
      $('mName').focus();
    }
    function closeModal(){ $('modalBg').classList.remove('open'); }
    function editProject(id){ const p=projects.find(x=>x.id===id); if(p) openModal(p); }

    function pageItemHtml(p){
      return `<div class="dnd-item" draggable="true" data-id="${esc(p.id)}">${ava(p)}<span>${esc(p.name)}</span></div>`;
    }
    function renderDnd(selectedSet){
      const sel = pages.filter(p=>selectedSet.has(p.id));
      const pool = pages.filter(p=>!selectedSet.has(p.id));
      $('poolList').innerHTML = pool.length ? pool.map(pageItemHtml).join('') : '<div class="dnd-empty">— ไม่มีเพจเหลือ —</div>';
      $('selList').innerHTML = sel.length ? sel.map(pageItemHtml).join('') : '<div class="dnd-empty">ลากเพจมาวางที่นี่</div>';
      $('selCount').textContent = sel.length;
      bindDnd();
    }
    function currentSelectedIds(){ return [...$('selList').querySelectorAll('.dnd-item')].map(el=>el.dataset.id); }

    function bindDnd(){
      let dragEl = null;
      document.querySelectorAll('.dnd-item').forEach(el=>{
        el.addEventListener('dragstart', ()=>{ dragEl=el; el.classList.add('dragging'); });
        el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); dragEl=null; });
      });
      ['poolList','selList'].forEach(zid=>{
        const zone = $(zid);
        zone.addEventListener('dragover', (e)=>{ e.preventDefault(); zone.classList.add('over'); });
        zone.addEventListener('dragleave', ()=> zone.classList.remove('over'));
        zone.addEventListener('drop', (e)=>{
          e.preventDefault(); zone.classList.remove('over');
          if(!dragEl) return;
          const empty = zone.querySelector('.dnd-empty'); if(empty) empty.remove();
          zone.appendChild(dragEl);
          // อัปเดตข้อความ empty + count
          syncEmpty(); $('selCount').textContent = currentSelectedIds().length;
        });
      });
      // คลิกที่ item = ย้ายข้ามฝั่งเร็วๆ
      document.querySelectorAll('.dnd-item').forEach(el=>{
        el.addEventListener('dblclick', ()=>{
          const inSel = el.closest('#selList');
          $(inSel?'poolList':'selList').appendChild(el);
          const t=$(inSel?'poolList':'selList').querySelector('.dnd-empty'); if(t) t.remove();
          syncEmpty(); $('selCount').textContent = currentSelectedIds().length;
        });
      });
    }
    function syncEmpty(){
      [['poolList','— ไม่มีเพจเหลือ —'],['selList','ลากเพจมาวางที่นี่']].forEach(([id,msg])=>{
        const z=$(id);
        if(!z.querySelector('.dnd-item') && !z.querySelector('.dnd-empty')) z.innerHTML=`<div class="dnd-empty">${msg}</div>`;
      });
    }

    async function saveProject(){
      const name = $('mName').value.trim();
      if(!name){ toast('กรุณาตั้งชื่อโปรเจกต์'); $('mName').focus(); return; }
      const body = { name, description: $('mDesc').value.trim(), pageIds: currentSelectedIds() };
      $('mSave').disabled = true;
      try{
        const url = editingId ? '/api/projects/'+encodeURIComponent(editingId) : '/api/projects';
        const res = await fetch(url, { method: editingId?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error);
        closeModal(); toast(editingId?'บันทึกโปรเจกต์แล้ว':'สร้างโปรเจกต์แล้ว');
        await load();
      }catch(err){ toast(err.message||'บันทึกไม่สำเร็จ'); }
      finally{ $('mSave').disabled = false; }
    }

    async function removeProject(id, name){
      if(!confirm(`ลบโปรเจกต์ "${name}"? (เพจและข้อมูลแชทไม่ถูกลบ)`)) return;
      await fetch('/api/projects/'+encodeURIComponent(id), { method:'DELETE' });
      toast('ลบโปรเจกต์แล้ว'); load();
    }

    $('modalBg').addEventListener('click', (e)=>{ if(e.target===$('modalBg')) closeModal(); });
    load();
  </script>
</body>
</html>
